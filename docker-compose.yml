services:
  # IT Tools MCP Server (standalone — pure data tools)
  it-tools-mcp-server:
    build:
      context: .
      dockerfile: mcp-server/it-tools-mcp-server/Dockerfile
    hostname: it-tools-mcp-server
    ports:
      - "3006:3000"
    env_file:
      - ./.env
    restart: unless-stopped
    volumes:
      - ./logs/it-tools-mcp-server:/app/logs
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # HR Tools MCP Server (standalone — pure data tools)
  hr-tools-mcp-server:
    build:
      context: .
      dockerfile: mcp-server/hr-tools-mcp-server/Dockerfile
    hostname: hr-tools-mcp-server
    ports:
      - "3007:3000"
    env_file:
      - ./.env
    restart: unless-stopped
    volumes:
      - ./logs/hr-tools-mcp-server:/app/logs
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Chatbot V2 — AI SDK + native MCP tool calling via LiteLLM
  chatbot-v2:
    build:
      context: .
      dockerfile: chatbot-v2/Dockerfile
    hostname: chatbot-v2
    ports:
      - "3008:3008"
    env_file:
      - ./.env
    environment:
      - CHATBOT_V2_PORT=3008
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - MCP_URL=${LITELLM_BASE_URL:-http://localhost:8080}/mcp/
      - PRISMA_AIRS_TSG_ID=${PRISMA_AIRS_TSG_ID:-}
      - PRISMA_AIRS_APP_ID=${PRISMA_AIRS_APP_ID:-}
    restart: unless-stopped
    volumes:
      - ./logs/chatbot-v2:/app/logs
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3008/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  mcp-network:
    driver: bridge

volumes:
  it-db:
